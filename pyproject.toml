[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-eval-micro-lab"
version = "0.1.0"
description = "Dependency-free utilities for small AI evaluation experiments"
requires-python = ">=3.10"
license = {text = "MIT"}

[project.scripts]
ai-eval = "ai_eval_micro_lab.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

